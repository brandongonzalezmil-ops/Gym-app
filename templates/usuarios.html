<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <a href="/">&larr; Volver a la lista</a>
    <h1>👥 Usuarios</h1>

    <ul class="lista-dia">
        {% for u in usuarios %}
            <li class="item-maquina">{{ u.nombre }}</li>
        {% endfor %}
    </ul>

    <h2>Agregar nuevo usuario</h2>
    <form action="/usuarios/agregar" method="POST" class="form-agregar">
        <label>Nombre:</label>
        <input type="text" name="nombre" required>
        <br><br>
        <button type="submit">Agregar</button>
    </form>
</body>
</html>
