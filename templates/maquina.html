<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ maquina.nombre }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <a href="/">&larr; Volver a la lista</a>
    <h1>{{ maquina.nombre }}</h1>
    <p>{{ maquina.descripcion }}</p>
 <p>{{ maquina.descripcion }}</p>
{% if maquina.imagen_url %}
    <img src="{{ url_for('static', filename='imagenes/' + maquina.imagen_url) }}" class="foto-maquina-grande" alt="{{ maquina.nombre }}">
{% endif %}
    <h2>Historial de peso</h2>
    <table>
<tr>
    <th>Persona</th>
    <th>Peso (kg)</th>
    <th>Reps</th>
    <th>Fecha</th>
    <th>Acción</th>
    <th>Borrar</th>
</tr>
        {% for r in registros %}
        <tr>
        <form action="/registro/{{ r.id }}/editar" method="POST">
<td>{{ r.nombre }}</td>
<td>
    <input type="number" step="0.5" name="peso_kg" value="{{ r.peso_kg }}" style="width: 70px;">
</td>
<td>
    <input type="number" name="repeticiones" value="{{ r.repeticiones or '' }}" style="width: 60px;">
</td>
<td>{{ r.fecha }}</td>
<td>
    <button type="submit">Actualizar</button>
</td>
</form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <h2>Agregar nuevo registro</h2>
    <form action="/maquina/{{ maquina.id }}/agregar" method="POST" class="form-agregar">
        <label>Persona:</label>
        <select name="usuario_id" required>
            {% for u in usuarios %}
                <option value="{{ u.id }}">{{ u.nombre }}</option>
            {% endfor %}
        </select>
        <br><br>
        <label>Peso (kg):</label>
<input type="number" step="0.5" name="peso_kg" required>
<br><br>
<label>Repeticiones:</label>
<input type="number" name="repeticiones" required>
<br><br>
<button type="submit">Guardar</button>
    </form>
</body>
</html>
